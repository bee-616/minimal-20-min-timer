<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Min Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;500&family=Inter:wght@500;600&family=Micro+5&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1B1B1B;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(28px, 5vh, 52px);
    padding: clamp(16px, 3vh, 32px);
  }

  .clock-wrap {
    position: relative;
    width: min(62vh, 72vw, 410px);
    height: min(62vh, 72vw, 410px);
    container-type: size;
    container-name: clock;
  }

  .bg-ring,
  .clock-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Digital time: slightly right of left-half center */
  .time-display {
    position: absolute;
    top: 50%;
    left: 28%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1;
    pointer-events: none;
    user-select: none;
    transition: opacity 0.4s ease;
  }

  .minutes-text {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 17cqw;
    color: #ffffff;
    line-height: 1;
    transition: color 0.4s ease, opacity 0.4s ease, font-weight 0.4s ease;
  }

  .seconds-text {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 17cqw;
    color: rgba(255, 255, 255, 0.20);
    line-height: 1;
    transition: color 0.4s ease, opacity 0.4s ease, font-weight 0.4s ease;
  }

  /* Done screen overlay — sits inside clock-wrap */
  .done-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .done-screen .material-icons-round {
    font-size: 11cqw;
    color: rgba(255,255,255,0.45);
  }

  .done-screen .done-label {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 8cqw;
    color: #ffffff;
    letter-spacing: -0.01em;
  }

  /* ── Intro animation initial states ── */
  #progressArc  { transition: none; }
  .time-display { transition: opacity 0.4s ease, transform 0.4s ease; }
  .controls     { transition: opacity 0.4s ease; }
  .controls {
    display: flex;
    gap: 14px;
    align-items: center;
    justify-content: center;
    width: min(56vw, 280px);
    transition: opacity 0.4s ease;
  }

  .btn {
    width: clamp(58px, 9vw, 78px);
    height: clamp(58px, 9vw, 78px);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease,
                background 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                width 0.45s cubic-bezier(0.25, 1, 0.5, 1),
                border-radius 0.45s cubic-bezier(0.25, 1, 0.5, 1),
                opacity 0.3s ease;
    outline: none;
    overflow: hidden;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.92); }
  .btn-play   { background: #ffffff; }
  .btn-cancel { background: #F9A9A9; }

  /* START pill — initial idle state */
  .btn-play.is-start {
    width: min(56vw, 280px);
    border-radius: 100px;
    background: #ffffff;
    gap: 10px;
  }

  .btn-play .start-label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(16px, 2.5vw, 20px);
    color: #1B1B1B;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: none;
  }

  .btn-play.is-start .start-label { display: inline; }
  .btn-play.is-start #playIcon    { display: block !important; }
  .btn-play.is-start #pauseIcon   { display: none !important; }

  /* cancel button hidden until timer starts */
  .btn-cancel.is-hidden {
    opacity: 0;
    pointer-events: none;
    width: 0;
    overflow: hidden;
  }

  /* RESTART pill state — applied via JS */
  .btn-cancel.is-restart {
    width: 100%;
    border-radius: 100px;
    background: #F9A9A9;
    gap: 6px;
  }

  .btn-cancel .restart-label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(19px, 3vw, 24px);
    color: #E73131;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: none;
  }

  .btn-cancel.is-restart .restart-label {
    display: inline;
  }

  .btn-cancel .cancel-icon  { display: block; }
  .btn-cancel.is-restart .cancel-icon { display: none; }
  .btn-cancel .restart-icon { display: none; }
  .btn-cancel.is-restart .restart-icon { display: flex; }
  /* DEV: Skip button */
  .skip-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 6px;
    cursor: pointer;
    outline: none;
    transition: background 0.2s ease;
  }
  .skip-btn:hover { background: rgba(255,255,255,0.10); }
  .skip-btn:active { transform: scale(0.95); }
  .skip-btn span.skip-text {
    font-family: 'Micro 5', monospace;
    font-size: 20px;
    color: #ffffff;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .skip-btn svg { flex-shrink: 0; }
</style>
</head>
<body>

      <circle cx="220" cy="220" r="200"

          <g clip-path="url(#rc)">

<script>
  const TOTAL = 20 * 60;
  const CIRC  = 2 * Math.PI * 200;
  const CX = 220, CY = 220;
  const MIN_LEN = 172;
  const SEC_LEN = 218;

  let remaining = TOTAL;
  let running = false;
  let rafId = null;
  let lastTs = null;
  let isDone = false;

  const progressArc = document.getElementById('progressArc');
  const minuteHand  = document.getElementById('minuteHand');
  const secondHand  = document.getElementById('secondHand');
  const minDisplay  = document.getElementById('minDisplay');
  const secDisplay  = document.getElementById('secDisplay');
  const playBtn     = document.getElementById('playBtn');
  const playIcon    = document.getElementById('playIcon');
  const pauseIcon   = document.getElementById('pauseIcon');
  const cancelBtn   = document.getElementById('cancelBtn');
  const clockSvg    = document.getElementById('clockSvg');
  const timeDisplay = document.getElementById('timeDisplay');
  const doneScreen  = document.getElementById('doneScreen');

  function updateUI(rem) {
    const mins = Math.floor(rem / 60);
    const secs = rem % 60;

    minDisplay.textContent = String(mins).padStart(2, '0');
    secDisplay.textContent = String(secs).padStart(2, '0');

    // Swap font styles from 00:59 downward — seconds get emphasis
    if (rem < 60) {
      minDisplay.className = 'seconds-text';
      secDisplay.className = 'minutes-text';
    } else {
      minDisplay.className = 'minutes-text';
      secDisplay.className = 'seconds-text';
    }

    progressArc.setAttribute('stroke-dashoffset', CIRC * (1 - rem / TOTAL));
    progressArc.setAttribute('stroke', rem <= 60 ? '#E73131' : '#ffffff');

    const minDeg = (rem / TOTAL) * 120;
    const minRad = (minDeg - 90) * Math.PI / 180;
    minuteHand.setAttribute('x2', CX + MIN_LEN * Math.cos(minRad));
    minuteHand.setAttribute('y2', CY + MIN_LEN * Math.sin(minRad));

    const secDeg = (secs / 60) * 360;
    const secRad = (secDeg - 90) * Math.PI / 180;
    secondHand.setAttribute('x2', CX + SEC_LEN * Math.cos(secRad));
    secondHand.setAttribute('y2', CY + SEC_LEN * Math.sin(secRad));
  }

  function playDoneSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Pattern: beep beep .... beep beep
    // [0ms, 180ms] then pause, [600ms, 780ms]
    const beeps = [0, 180, 600, 780, 1400, 1580, 2000, 2180];
    beeps.forEach(startMs => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = 880; // A5 — clear, pleasant
      const start = ctx.currentTime + startMs / 1000;
      const dur = 0.13;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.4, start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
      osc.start(start);
      osc.stop(start + dur);
    });
  }

  function showDoneScreen() {
    isDone = true;
    playDoneSound();
    // Fade out clock face elements
    clockSvg.style.opacity   = '0';
    timeDisplay.style.opacity = '0';
    // Fade in done overlay
    doneScreen.style.opacity      = '1';
    doneScreen.style.pointerEvents = 'none';
    // Hide play button, morph cancel → restart pill
    playBtn.style.opacity = '0';
    playBtn.style.pointerEvents = 'none';
    playBtn.style.width = '0';
    playBtn.style.overflow = 'hidden';
    cancelBtn.classList.add('is-restart');
  }

  function hideDoneScreen() {
    isDone = false;
    clockSvg.style.opacity    = '1';
    timeDisplay.style.opacity  = '1';
    doneScreen.style.opacity       = '0';
    doneScreen.style.pointerEvents  = 'none';
    playBtn.style.opacity      = '1';
    playBtn.style.pointerEvents = 'auto';
    playBtn.style.width = '';
    cancelBtn.classList.remove('is-restart');
  }

  function loop(ts) {
    if (!lastTs) {
      lastTs = ts;
      if (remaining > 0) remaining--;
      updateUI(remaining);
      if (remaining <= 0) { setPlayState(false); showDoneScreen(); return; }
    }
    const elapsed = ts - lastTs;
    if (elapsed >= 1000) {
      lastTs = ts - (elapsed % 1000);
      if (remaining > 0) remaining--;
      updateUI(remaining);
      if (remaining <= 0) {
        setPlayState(false);
        showDoneScreen();
        return;
      }
    }
    if (running) rafId = requestAnimationFrame(loop);
  }

  let hasStarted = false; // tracks if timer has ever been started

  function setPlayState(on) {
    running = on;
    playIcon.style.display  = on ? 'none'  : 'block';
    pauseIcon.style.display = on ? 'block' : 'none';
    playBtn.style.background = on ? 'rgba(255,255,255,0.08)' : '#ffffff';

    if (on && !hasStarted) {
      // First start: morph pill → round button, reveal cancel
      hasStarted = true;
      playBtn.classList.remove('is-start');
      cancelBtn.classList.remove('is-hidden');
    }
  }

  function resetToIdle() {
    // Go back to START pill state
    hasStarted = false;
    playBtn.classList.add('is-start');
    playBtn.style.background = '#ffffff';
    playIcon.style.display  = 'block';
    pauseIcon.style.display = 'none';
    cancelBtn.classList.add('is-hidden');
  }

  playBtn.addEventListener('click', () => {
    if (!introComplete || isDone || remaining <= 0) return;
    if (!running) {
      lastTs = null;
      setPlayState(true);
      rafId = requestAnimationFrame(loop);
    } else {
      setPlayState(false);
      cancelAnimationFrame(rafId);
    }
  });

  cancelBtn.addEventListener('click', () => {
    if (isDone) {
      hideDoneScreen();
      setPlayState(false);
      cancelAnimationFrame(rafId);
      remaining = TOTAL;
      lastTs = null;
      updateUI(remaining);
      resetToIdle();
      return;
    }
    setPlayState(false);
    cancelAnimationFrame(rafId);
    remaining = TOTAL;
    lastTs = null;
    updateUI(remaining);
    resetToIdle();
  });

  // ── Intro animation ──
  let introComplete = false;
  playBtn.style.pointerEvents  = 'none';
  cancelBtn.style.pointerEvents = 'none';

  updateUI(remaining);

  // Hide time & controls initially
  timeDisplay.style.opacity   = '0';
  timeDisplay.style.transform = 'translate(-50%, calc(-50% + 12px))';
  document.querySelector('.controls').style.opacity = '0';

  // Reset hands to start positions
  minuteHand.setAttribute('x2', CX);
  minuteHand.setAttribute('y2', CY);
  const secStartRad = -90 * Math.PI / 180;
  secondHand.setAttribute('x2', CX + SEC_LEN * Math.cos(secStartRad));
  secondHand.setAttribute('y2', CY + SEC_LEN * Math.sin(secStartRad));

  // Arc starts empty
  progressArc.setAttribute('stroke-dashoffset', CIRC);

  // Hide hands fully at start
  secondHand.setAttribute('x2', CX);
  secondHand.setAttribute('y2', CY);
  minuteHand.setAttribute('x2', CX);
  minuteHand.setAttribute('y2', CY);
  minuteHand.setAttribute('stroke-width', '0');

  // Timing offsets (all relative to introStart)
  const ARC_START   = 0;
  const ARC_DUR     = 1600;
  const SEC_GROW_START = 300;   // second hand grows after arc begins
  const SEC_GROW_DUR   = 400;   // grows to full length
  const SEC_SPIN_START = 700;   // spin starts right after grow
  const SEC_SPIN_DUR   = 1000;  // full 360
  const MIN_START   = SEC_SPIN_START + 200; // minute starts shortly after spin begins
  const MIN_DUR     = 1000;
  const NUM_DELAY   = MIN_START + 400;
  const CTRL_DELAY  = NUM_DELAY + 400;

  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function easeOut(t)   { return 1 - (1-t)*(1-t); }

  const introStart = performance.now();
  let numbersStarted  = false;
  let controlsStarted = false;
  let introDone       = false;

  // Track second hand current angle for smooth handoff grow→spin
  let secCurrentLen = 0;

  function animIntro(now) {
    const elapsed = now - introStart;

    // ── Arc ──
    const tArc = Math.min((elapsed - ARC_START) / ARC_DUR, 1);
    progressArc.setAttribute('stroke-dashoffset', CIRC * (1 - easeInOut(Math.max(tArc, 0))));

    // ── Second hand: grow from center ──
    if (elapsed >= SEC_GROW_START && elapsed < SEC_SPIN_START) {
      const tg = Math.min((elapsed - SEC_GROW_START) / SEC_GROW_DUR, 1);
      secCurrentLen = easeOut(tg) * SEC_LEN;
      const secRad = -90 * Math.PI / 180; // pointing at 12 while growing
      secondHand.setAttribute('x2', CX + secCurrentLen * Math.cos(secRad));
      secondHand.setAttribute('y2', CY + secCurrentLen * Math.sin(secRad));
    }

    // ── Second hand: 360 spin ──
    if (elapsed >= SEC_SPIN_START) {
      const ts = Math.min((elapsed - SEC_SPIN_START) / SEC_SPIN_DUR, 1);
      const secRad = (easeInOut(ts) * 360 - 90) * Math.PI / 180;
      secondHand.setAttribute('x2', CX + SEC_LEN * Math.cos(secRad));
      secondHand.setAttribute('y2', CY + SEC_LEN * Math.sin(secRad));
    }

    // ── Minute hand: scale up from 0 then grow outward ──
    if (elapsed >= MIN_START) {
      const tm = Math.min((elapsed - MIN_START) / MIN_DUR, 1);
      const minDeg = (remaining / TOTAL) * 120;
      const minRad = (minDeg - 90) * Math.PI / 180;
      const len = easeOut(tm) * MIN_LEN;
      minuteHand.setAttribute('x2', CX + len * Math.cos(minRad));
      minuteHand.setAttribute('y2', CY + len * Math.sin(minRad));
      // Scale stroke width from 0 → 8 to avoid dot artifact
      minuteHand.setAttribute('stroke-width', Math.min(tm * 80, 8));
    }

    // ── Numbers ──
    if (elapsed >= NUM_DELAY && !numbersStarted) {
      numbersStarted = true;
      timeDisplay.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
      timeDisplay.style.opacity    = '1';
      timeDisplay.style.transform  = 'translate(-50%, -50%)';
    }

    // ── Controls ──
    if (elapsed >= CTRL_DELAY && !controlsStarted) {
      controlsStarted = true;
      const ctrl = document.querySelector('.controls');
      ctrl.style.transition = 'opacity 0.4s ease-out';
      ctrl.style.opacity    = '1';
    }

    // ── Unlock ──
    if (elapsed >= CTRL_DELAY + 400 && !introDone) {
      introDone = true;
      introComplete = true;
      minuteHand.setAttribute('stroke-width', '8');
      playBtn.style.pointerEvents   = 'auto';
      cancelBtn.style.pointerEvents = 'auto';
      return;
    }

    requestAnimationFrame(animIntro);
  }
  requestAnimationFrame(animIntro);
</script>
